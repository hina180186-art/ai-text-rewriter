<!DOCTYPE html>
<html>
<head>
  <title>AI Text Rewriter</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 50px auto;
    }
    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      background: #f4f4f4;
      padding: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h2>AI Text Rewriter</h2>

<textarea id="input" placeholder="Paste your text..."></textarea>
<br>
<button onclick="rewriteText()">Improve</button>

<div id="output"></div>

<script>
async function rewriteText() {
  const input = document.getElementById("input").value;

  const res = await fetch("/api/rewrite", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ text: input }),
  });

  const data = await res.json();
  document.getElementById("output").innerText = data.output;
}
</script>

</body>
</html>
